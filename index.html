<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trek VRAEM — Circuito 5 Cataratas / Rey del VRAEM</title>
<script>
  window.__debugErrors = [];
  window.addEventListener('error', function(e){
    var msg = '⚠️ ERROR: ' + e.message + '\n   archivo: ' + e.filename + '\n   línea: ' + e.lineno + ':' + e.colno + '\n\n';
    window.__debugErrors.push(msg);
    renderDebugBox();
  });
  function renderDebugBox(){
    if(!document.body) return;
    if(window.__debugErrors.length === 0) return;
    var box = document.getElementById('debugErrorBox');
    if(!box){
      box = document.createElement('div');
      box.id = 'debugErrorBox';
      box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#3a0d0d;color:#ffb0a5;font-family:monospace;font-size:12px;padding:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;';
      document.body.appendChild(box);
    }
    box.textContent = window.__debugErrors.join('');
  }
  document.addEventListener('DOMContentLoaded', renderDebugBox);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=AQCk-acPsg98Cp4LIFFPIGvB3K9zI4PTaq0pKWOlBMRb1wuAeEOmdPHsHt_MHAz0FJaUCJQhQFmGmYCO&currency=USD"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --forest-deep:#0F2419;
    --canopy:#1B4332;
    --river:#2D6E6E;
    --coral:#FF6B4A;
    --sand:#E8D9B5;
    --mist:#F0F4EF;
    --text-dim: rgba(240,244,239,0.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--forest-deep);
    color:var(--mist);
    font-family:'Inter',sans-serif;
    line-height:1.5;
    overflow-x:hidden;
  }
  ::selection{background:var(--coral);color:var(--forest-deep);}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .wrap{max-width:920px;margin:0 auto;padding:0 24px;}

  /* NAV */
  nav{
    position:sticky;top:0;z-index:50;
    background:rgba(15,36,25,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(240,244,239,0.08);
  }
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:64px;}
  .brand{font-family:'Fraunces',serif;font-weight:600;font-size:1.1rem;letter-spacing:0.02em;}
  .brand span{color:var(--coral);}
  nav a.cta{
    background:var(--coral);color:var(--forest-deep);
    padding:8px 18px;border-radius:100px;
    font-size:0.85rem;font-weight:600;text-decoration:none;
    transition:transform 0.2s ease;
  }
  nav a.cta:hover{transform:translateY(-1px);}
  nav .wrap{display:flex;flex-direction:column;align-items:stretch;gap:8px;padding:12px 24px;height:auto;}
  .nav-top-row{display:flex;align-items:center;justify-content:space-between;width:100%;}
  .nav-links{display:flex;gap:10px;justify-content:center;overflow-x:auto;flex-wrap:wrap;}
  .nav-links a{
    text-decoration:none;white-space:nowrap;font-size:0.76rem;font-weight:700;
    padding:7px 14px;border-radius:100px;transition:transform 0.15s ease;
  }
  .nav-links a:hover{transform:translateY(-2px);}
  .nl-inicio{background:var(--coral);color:var(--forest-deep);}
  .nl-pichari{background:#4FBFBF;color:var(--forest-deep);}
  .nl-contacto{background:var(--sand);color:var(--forest-deep);}
  .nl-anuncios{background:#C77DFF;color:var(--forest-deep);}
  .nl-nosotros{background:#5DDD8F;color:var(--forest-deep);}

  /* HERO */
  header.hero{
    padding:72px 0 40px;
    position:relative;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--sand);opacity:0.85;margin-bottom:18px;
    display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--sand);opacity:0.6;}
  h1.title{
    font-size:clamp(2.4rem,6vw,4rem);
    line-height:1.02;
    max-width:11ch;
    margin:0 auto 20px;
    text-align:center;
  }
  h1.title em{font-style:italic;color:var(--coral);}
  .subtitle-wrap{margin-bottom:36px;}
  .subtitle{
    font-size:1.05rem;color:var(--text-dim);max-width:46ch;margin:0;
    max-height:220px;opacity:1;overflow:hidden;
    transition:opacity 0.7s ease, max-height 0.7s ease, margin 0.7s ease;
  }
  .subtitle.is-collapsed{
    opacity:0;max-height:0;margin:0;pointer-events:none;
  }
  .subtitle-tab{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(240,244,239,0.05);border:1px solid rgba(240,244,239,0.14);
    border-radius:100px;padding:9px 18px;
    color:var(--mist);font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;
    cursor:pointer;opacity:0;max-height:0;overflow:hidden;
    transition:opacity 0.6s ease 0.15s, max-height 0.6s ease;
  }
  .subtitle-tab.is-visible{opacity:1;max-height:60px;}
  .tab-dots{color:var(--coral);letter-spacing:2px;animation:dotPulse 1.4s ease-in-out infinite;}
  @keyframes dotPulse{0%,100%{opacity:0.35;}50%{opacity:1;}}
  @media (prefers-reduced-motion: reduce){
    .subtitle, .subtitle-tab, .tab-dots{transition:none;animation:none;}
  }

  /* MAPA EN EL HERO */
  .hero-map{
    margin:20px 0 8px;
    background:rgba(240,244,239,0.03);
    border:1px solid rgba(240,244,239,0.1);
    border-radius:16px;
    padding:20px 20px 16px;
    position:relative;
  }
  .map-tabs{
    display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
    gap:8px;margin-bottom:10px;
  }
  .map-tab{
    background:transparent;border:1px solid rgba(240,244,239,0.14);
    color:var(--text-dim);font-family:'Inter',sans-serif;font-size:0.78rem;
    padding:8px 14px;border-radius:100px;cursor:pointer;
    text-decoration:none;display:inline-block;text-align:center;
    flex:0 1 auto;
  }
  .map-tab.active{background:var(--coral);border-color:var(--coral);color:var(--forest-deep);font-weight:600;}
  .map-fullscreen-btn{
    background:transparent;border:1px solid rgba(240,244,239,0.14);
    color:var(--mist);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:0.95rem;
  }
  .map-frame-wrap{border-radius:12px;overflow:hidden;}
  .map-box.is-fullscreen{
    position:fixed;inset:0;z-index:200;
    margin:0;border-radius:0;padding:16px;
    background:var(--forest-deep);
    display:flex;flex-direction:column;
  }
  .map-box.is-fullscreen .map-frame-wrap{flex:1;}
  .map-box.is-fullscreen iframe{height:100% !important;}

  .stat-row{
    display:flex;gap:28px;flex-wrap:wrap;margin:28px 0 4px;
  }
  .stat{}
  .stat .num{font-family:'IBM Plex Mono',monospace;font-size:1.3rem;color:var(--coral);}
  .stat .lbl{font-size:0.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;}

  /* PHILOSOPHY */
  section.philosophy{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  .philosophy h2{font-size:1.8rem;margin-bottom:18px;max-width:16ch;}
  .philosophy p{color:var(--text-dim);max-width:56ch;font-size:1rem;}
  .philosophy .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:36px;}
  .pcard{
    background:rgba(240,244,239,0.03);
    border:1px solid rgba(240,244,239,0.08);
    border-radius:12px;padding:20px;
  }
  .pcard .mono{color:var(--river);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;}
  .pcard h3{font-size:1.05rem;margin:10px 0 8px;}
  .pcard p{font-size:0.88rem;color:var(--text-dim);}

  @media (max-width:640px){
    .philosophy .grid{grid-template-columns:1fr;}
  }

  /* WAYPOINTS / TRAIL LOG */
  section.trail{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  section.trail h2{font-size:1.8rem;margin-bottom:8px;}
  section.trail > .wrap > p.lead{color:var(--text-dim);margin-bottom:36px;}
  .log-entry{
    display:grid;grid-template-columns:70px 1fr;gap:20px;
    padding:20px 0;border-top:1px solid rgba(240,244,239,0.08);
  }
  .log-entry:first-of-type{border-top:none;}
  .log-entry .km{font-family:'IBM Plex Mono',monospace;color:var(--coral);font-size:0.95rem;padding-top:2px;}
  .log-entry h3{font-size:1.05rem;margin-bottom:4px;}
  .log-entry p{font-size:0.9rem;color:var(--text-dim);}
  .trail-note{
    font-size:0.85rem;color:var(--text-dim);margin-top:24px;padding-top:20px;
    border-top:1px solid rgba(240,244,239,0.08);line-height:1.5;
  }

  .map-box-head{
    display:flex;justify-content:center;align-items:baseline;
    margin-bottom:14px;flex-wrap:wrap;gap:6px;text-align:center;
  }
  .map-box-head h3{
    font-size:0.85rem;font-weight:600;font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.08em;text-transform:uppercase;
    background:rgba(255,107,74,0.12);border:1px solid rgba(255,107,74,0.35);
    color:var(--coral);padding:8px 18px;border-radius:100px;display:inline-block;
  }
  .map-box-head .mono{color:var(--coral);font-size:0.85rem;}
  .map-note{font-size:0.78rem;color:var(--text-dim);margin-top:10px;}

  /* MARKETPLACE (reemplaza el mapa al tocar la pestaña Negocios) */
  .marketplace-grid{
    display:none;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .marketplace-grid.is-active{display:grid;}
  .valoracion-panel{display:none;}
  .valoracion-panel.is-active{display:block;}
  .pedometro-panel{display:none;}
  .pedometro-panel.is-active{display:block;}
  .radio-panel{display:none;}
  .radio-panel.is-active{display:block;}
  .dengue-panel{display:none;}
  .dengue-panel.is-active{display:block;}
  .dengue-title-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .dengue-title-row h3{
    font-size:1.2rem;color:var(--coral);letter-spacing:0.02em;
  }
  .mosquito-fly{
    font-size:1.8rem;display:inline-block;
    animation:mosquitoFly 1.8s ease-in-out infinite;
  }
  @keyframes mosquitoFly{
    0%{transform:translate(0,0) rotate(0deg);}
    20%{transform:translate(3px,-4px) rotate(-8deg);}
    40%{transform:translate(-2px,2px) rotate(6deg);}
    60%{transform:translate(4px,3px) rotate(-5deg);}
    80%{transform:translate(-3px,-2px) rotate(8deg);}
    100%{transform:translate(0,0) rotate(0deg);}
  }
  @media (prefers-reduced-motion: reduce){
    .mosquito-fly{animation:none;}
  }
  .dengue-p{color:var(--text-dim);font-size:0.88rem;line-height:1.5;margin-bottom:12px;}
  .dengue-list{margin:0 0 16px 18px;color:var(--text-dim);font-size:0.86rem;line-height:1.7;}
  .dengue-vacuna{
    background:rgba(255,107,74,0.1);border:1px solid rgba(255,107,74,0.3);
    border-radius:10px;padding:14px;font-size:0.85rem;color:var(--mist);line-height:1.5;margin-bottom:12px;
  }
  .dengue-note{font-size:0.75rem;color:var(--text-dim);}
  .mkt-card{
    background:rgba(240,244,239,0.03);
    border:1px solid rgba(240,244,239,0.12);
    border-radius:12px;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .mkt-card img{
    width:100%;height:110px;object-fit:cover;display:block;
  }
  .mkt-card-imgs{display:flex;gap:2px;}
  .mkt-card-imgs img{flex:1;height:110px;object-fit:cover;display:block;}
  .mkt-card-body{padding:12px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .mkt-card-title{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:600;}
  .mkt-card-sub{font-size:0.72rem;color:var(--text-dim);}
  .mkt-card-cta{
    margin-top:auto;display:inline-block;text-align:center;
    background:var(--coral);color:var(--forest-deep);
    font-size:0.78rem;font-weight:600;text-decoration:none;
    padding:8px 10px;border-radius:8px;
  }
  .mkt-card.is-empty{
    align-items:center;justify-content:center;text-align:center;
    border:1px dashed rgba(240,244,239,0.25);background:transparent;
    padding:20px 12px;gap:8px;min-height:170px;
  }
  .mkt-card.is-empty .mkt-empty-icon{font-size:1.5rem;color:var(--text-dim);}
  .mkt-card.is-empty .mkt-card-sub{font-size:0.78rem;}
  .mkt-card.is-empty .mkt-card-cta{
    background:transparent;border:1px solid rgba(240,244,239,0.25);color:var(--mist);
  }
  @media (max-width:480px){
    .marketplace-grid{grid-template-columns:1fr;}
  }

  /* NEGOCIOS CON ESSTRADA CO. */
  section.negocios{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  section.negocios h2{font-size:1.8rem;margin-bottom:6px;}
  section.negocios .lead{color:var(--text-dim);margin-bottom:28px;font-size:1rem;}
  .negocios-box{
    background:linear-gradient(155deg, rgba(45,110,110,0.15), rgba(255,107,74,0.06));
    border:1px solid rgba(240,244,239,0.1);border-radius:16px;padding:28px;
  }
  .negocios-box .wa-btn{margin-top:0;}
  .pago-methods{
    display:flex;flex-direction:column;gap:10px;margin-top:20px;
    padding-top:20px;border-top:1px solid rgba(240,244,239,0.1);
  }
  .pago-method{font-size:0.85rem;color:var(--text-dim);}
  .pago-method strong{color:var(--mist);}
  .pago-method .mono-value{
    font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--sand);
    word-break:break-all;
  }

  /* PICHARI: historia, aniversario, galería */
  section.pichari{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  section.pichari h2{font-size:1.8rem;margin-bottom:6px;}
  section.pichari .lead{color:var(--text-dim);margin-bottom:28px;font-size:1rem;}
  .pichari-info p{color:var(--text-dim);font-size:0.92rem;line-height:1.6;margin-bottom:16px;}
  .pichari-aniversario{
    display:inline-block;background:rgba(255,107,74,0.12);border:1px solid rgba(255,107,74,0.35);
    color:var(--mist);padding:10px 16px;border-radius:10px;font-size:0.9rem;margin-bottom:28px;
  }
  .pichari-gallery{
    display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;margin-bottom:36px;
  }
  .pichari-gallery-item{
    position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;
    background:rgba(240,244,239,0.05);border:1px solid rgba(240,244,239,0.1);
  }
  .pichari-gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}
  .pichari-gallery-item span{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    color:var(--mist);font-size:0.7rem;padding:16px 8px 6px;text-align:center;
  }
  @media (max-width:480px){
    .pichari-gallery{grid-template-columns:repeat(2, 1fr);}
  }
  .anuncios-pichari{
    padding-top:24px;border-top:1px solid rgba(240,244,239,0.08);
  }
  .anuncios-pichari h3{font-size:1.2rem;margin-bottom:4px;}

  /* NOSOTROS: tarjetas de pago (QR Ligo, PayPal, Bitcoin) */
  section.nosotros{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  section.nosotros h2{font-size:1.8rem;margin-bottom:6px;}
  section.nosotros .lead{color:var(--text-dim);margin-bottom:28px;font-size:1rem;}
  .nosotros-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .nosotros-card{
    background:rgba(240,244,239,0.03);border:1px solid rgba(240,244,239,0.12);
    border-radius:12px;padding:18px;
  }
  .nosotros-icon{font-size:1.6rem;margin-bottom:8px;}
  .nosotros-title{font-family:'Fraunces',serif;font-weight:600;font-size:1rem;margin-bottom:6px;}
  .nosotros-desc{font-size:0.82rem;color:var(--text-dim);line-height:1.5;}
  .paypal-embed{
    margin-top:14px;padding-top:14px;border-top:1px solid rgba(240,244,239,0.1);
  }
  .paypal-embed label{
    font-size:0.75rem;color:var(--text-dim);display:block;margin-bottom:6px;
  }
  .paypal-embed input{
    width:100%;padding:9px 12px;margin-bottom:10px;
    background:rgba(240,244,239,0.05);border:1px solid rgba(240,244,239,0.15);
    border-radius:8px;color:var(--mist);font-size:0.9rem;font-family:'Inter',sans-serif;
  }
  .paypal-embed input:focus{outline:2px solid var(--coral);outline-offset:1px;border-color:transparent;}
  .paypal-status{font-size:0.78rem;color:var(--text-dim);margin-top:8px;}
  @media (max-width:480px){
    .nosotros-grid{grid-template-columns:1fr;}
  }

  /* ALERTA DENGUE */
  section.dengue{padding:60px 0;border-top:1px solid rgba(240,244,239,0.08);}
  .dengue-box{
    background:rgba(255,107,74,0.08);
    border:1px solid rgba(255,107,74,0.3);
    border-radius:16px;padding:28px;
    display:flex;gap:18px;align-items:flex-start;
  }
  .dengue-icon{font-size:2.2rem;flex:0 0 auto;line-height:1;}
  .dengue-box h2{font-size:1.4rem;margin-bottom:8px;color:var(--mist);}
  .dengue-box ul{margin:12px 0 0 18px;color:var(--text-dim);font-size:0.9rem;line-height:1.7;}
  .dengue-box .dengue-note{font-size:0.78rem;color:var(--text-dim);margin-top:14px;}
  @media (max-width:480px){
    .dengue-box{flex-direction:column;}
  }

  /* REGISTRO */
  section.registro{padding:60px 0 90px;border-top:1px solid rgba(240,244,239,0.08);}
  .reg-box{
    background:linear-gradient(155deg, rgba(45,110,110,0.15), rgba(255,107,74,0.06));
    border:1px solid rgba(240,244,239,0.1);
    border-radius:18px;padding:36px;
  }
  .reg-box h2{font-size:1.6rem;margin-bottom:6px;}
  .reg-box .cupos{font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--sand);margin-bottom:28px;}
  form{display:grid;gap:14px;max-width:420px;}
  label{font-size:0.8rem;color:var(--text-dim);display:block;margin-bottom:6px;}
  input[type=text], input[type=tel]{
    width:100%;padding:12px 14px;
    background:rgba(240,244,239,0.05);
    border:1px solid rgba(240,244,239,0.15);
    border-radius:8px;color:var(--mist);font-size:0.95rem;
    font-family:'Inter',sans-serif;
  }
  input:focus{outline:2px solid var(--coral);outline-offset:1px;border-color:transparent;}
  .checkbox-row{display:flex;align-items:center;gap:10px;font-size:0.88rem;color:var(--text-dim);}
  .checkbox-row input{width:auto;}
  button.submit{
    margin-top:6px;
    background:var(--coral);color:var(--forest-deep);
    border:none;padding:14px 20px;border-radius:8px;
    font-weight:600;font-size:0.95rem;cursor:pointer;
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  button.submit:hover{transform:translateY(-1px);}
  button.submit:disabled{opacity:0.5;cursor:not-allowed;}
  .pago-note{
    margin-top:22px;padding-top:22px;border-top:1px solid rgba(240,244,239,0.1);
    font-size:0.85rem;color:var(--text-dim);max-width:420px;
  }
  .pago-note strong{color:var(--mist);}
  .confirm-msg{
    display:none;background:rgba(255,107,74,0.12);border:1px solid rgba(255,107,74,0.3);
    border-radius:10px;padding:16px 18px;font-size:0.9rem;margin-top:6px;
  }
  .waiver-box{
    background:rgba(240,244,239,0.04);
    border:1px solid rgba(240,244,239,0.12);
    border-radius:10px;padding:16px;
  }
  .waiver-text{
    max-height:160px;overflow-y:auto;
    font-size:0.8rem;line-height:1.55;color:var(--text-dim);
    padding-right:6px;
  }
  .waiver-text::-webkit-scrollbar{width:6px;}
